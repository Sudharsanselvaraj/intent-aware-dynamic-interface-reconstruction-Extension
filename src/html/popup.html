<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Morphic</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1e1e2e;
      color: #ffffff;
    }
    
    .header {
      padding: 16px;
      border-bottom: 1px solid #3f3f50;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .logo {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }
    
    .title {
      font-size: 16px;
      font-weight: 600;
    }
    
    .subtitle {
      font-size: 11px;
      color: #a1a1aa;
    }
    
    .status-bar {
      padding: 12px 16px;
      background: #2a2a3e;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #a1a1aa;
    }
    
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #22c55e;
    }
    
    .status-dot.disabled {
      background: #71717a;
    }
    
    .toggle-btn {
      background: #6366f1;
      border: none;
      color: #fff;
      padding: 6px 12px;
      border-radius: 4px;
      font-size: 12px;
      cursor: pointer;
    }
    
    .toggle-btn:hover {
      background: #4f46e5;
    }
    
    .toggle-btn.off {
      background: #3f3f50;
    }
    
    .intent-display {
      padding: 16px;
    }
    
    .intent-label {
      font-size: 12px;
      color: #a1a1aa;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }
    
    .current-intent {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px;
      background: #2a2a3e;
      border-radius: 8px;
      border: 1px solid #3f3f50;
    }
    
    .intent-icon {
      font-size: 24px;
    }
    
    .intent-name {
      font-size: 16px;
      font-weight: 600;
    }
    
    .intent-desc {
      font-size: 11px;
      color: #a1a1aa;
    }
    
    .intents-section {
      padding: 0 16px 16px;
    }
    
    .section-title {
      font-size: 12px;
      font-weight: 600;
      color: #a1a1aa;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
    }
    
    .intent-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    
    .intent-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 12px 8px;
      background: #2a2a3e;
      border: 1px solid #3f3f50;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .intent-btn:hover {
      border-color: #6366f1;
      background: #3f3f50;
    }
    
    .intent-btn.active {
      border-color: #6366f1;
      background: rgba(99, 102, 241, 0.2);
    }
    
    .intent-btn .intent-icon {
      font-size: 18px;
    }
    
    .intent-btn .intent-label {
      font-size: 11px;
      color: #fff;
      text-transform: none;
      letter-spacing: 0;
      margin: 0;
    }
    
    .divider {
      height: 1px;
      background: #3f3f50;
      margin: 0 16px 16px;
    }
    
    .footer {
      padding: 12px 16px;
      border-top: 1px solid #3f3f50;
      text-align: center;
    }
    
    .footer-text {
      font-size: 11px;
      color: #71717a;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">◈</div>
    <div>
      <div class="title">Morphic</div>
      <div class="subtitle">Live Page Reconstruction</div>
    </div>
  </div>
  
  <div class="status-bar">
    <div class="status">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Active</span>
    </div>
    <button class="toggle-btn" id="toggleBtn">Disable</button>
  </div>
  
  <div class="intent-display">
    <div class="intent-label">Current Intent</div>
    <div class="current-intent">
      <span class="intent-icon" id="currentIntentIcon">📖</span>
      <div>
        <div class="intent-name" id="currentIntentName">Reading</div>
        <div class="intent-desc" id="currentIntentDesc">Slow scroll detected</div>
      </div>
    </div>
  </div>
  
  <div class="divider"></div>
  
  <div class="intents-section">
    <div class="section-title">Manual Intent</div>
    <div class="intent-grid">
      <button class="intent-btn" data-intent="reading">
        <span class="intent-icon">📖</span>
        <span class="intent-label">Reading</span>
      </button>
      <button class="intent-btn" data-intent="filling-form">
        <span class="intent-icon">📝</span>
        <span class="intent-label">Filling Form</span>
      </button>
      <button class="intent-btn" data-intent="applying">
        <span class="intent-icon">💼</span>
        <span class="intent-label">Applying</span>
      </button>
      <button class="intent-btn" data-intent="shopping">
        <span class="intent-icon">🛒</span>
        <span class="intent-label">Shopping</span>
      </button>
      <button class="intent-btn" data-intent="researching">
        <span class="intent-icon">🔬</span>
        <span class="intent-label">Researching</span>
      </button>
      <button class="intent-btn" data-intent="skimming">
        <span class="intent-icon">⚡</span>
        <span class="intent-label">Skimming</span>
      </button>
    </div>
  </div>
  
  <div class="divider"></div>
  
  <div class="footer">
    <div class="footer-text">Auto-detects intent from your behavior</div>
  </div>
  
  <script src="../js/popup.js"></script>
</body>
</html>
